name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              output="dist/mmk-cn-${os}-${arch}"
              GOOS=$os GOARCH=$arch go build -ldflags "-X main.version=${{ github.ref_name }}" -o "$output" ./cmd/mmk-cn
              echo "Built $output"
            done
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mmk-cn-*
          generate_release_notes: true
